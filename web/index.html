<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᚱᚢᚾᛖ</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/highlight-dark.min.css">
</head>
<body>
    <!-- Nickname Modal -->
    <div id="nickname-modal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-title">ᚱᚢᚾᛖ</div>
        <div class="modal-subtitle">Enter your nickname to join</div>
        <input id="nickname-input" type="text" placeholder="your name..." maxlength="20" autofocus />
        <input id="token-input" type="password" placeholder="access token (if required)" />
        <button id="nickname-submit" onclick="submitNickname()">Join →</button>
      </div>
    </div>

    <div id="app">
        <!-- Left Panel: Sessions -->
        <aside id="panel-left" class="panel panel-left collapsed">
            <div class="resize-handle" id="resize-left">
                <span class="toggle-icon">›</span>
            </div>
            <div class="panel-content">
                <h3>Online <span id="online-count" style="color:var(--success)">0</span></h3>
                <div class="session-list" id="session-list">
                </div>
            </div>
        </aside>

        <!-- Center: Spec Editor -->
        <main id="panel-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <span class="doc-title">spec.md</span>
                </div>
            </div>
            <div id="center-body">
                <div id="editor-container">
                    <pre id="editor-highlight" aria-hidden="true"><code id="editor-highlight-code" class="language-markdown"></code></pre>
                    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
                </div>
                <div id="preview-container" class="hidden">
                    <div id="preview"></div>
                </div>
            </div>
        </main>

        <!-- Right Panel: Chat -->
        <aside id="panel-right" class="panel panel-right">
            <div class="resize-handle" id="resize-right">
                <span class="toggle-icon">‹</span>
            </div>
            <div class="panel-content">
                <div class="chat-header">
                    <h3>ᚱᚢᚾᛖ</h3>
                    <div class="chat-header-right">
                        <button id="btn-edit" class="toolbar-btn active" onclick="toggleEdit()" title="Toggle editor">✏️</button>
                        <button id="btn-preview" class="toolbar-btn" onclick="togglePreview()" title="Toggle preview">👁</button>
                        <span id="status-indicator" class="status idle">● idle</span>
                    </div>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea id="chat-input" placeholder="Message ᚱᚢᚾᛖ..." rows="2"></textarea>
                    <button id="chat-send" onclick="sendMessage()">⏎</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="/assets-bin/mermaid.min.js" defer></script>
    <script>
      // Initialize mermaid once the script loads
      document.addEventListener("DOMContentLoaded", function() {
        var t = setInterval(function() {
          if (window.mermaid) {
            clearInterval(t);
            mermaid.initialize({ startOnLoad: false, theme: "dark" });
          }
        }, 50);
      });
    </script>
    <script src="/assets/marked.min.js"></script>
    <script src="/assets/highlight.min.js"></script>
    <script src="/assets/app.js"></script>
</body>
</html>
